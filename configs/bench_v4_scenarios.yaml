# BENCH v4 scenarios
# Matches the paper: Niamir et al. (2024), Energy Research & Social Science 110
#
# Each entry is one configuration run.
# Fields:
#   case_study  : "NL" (Netherlands-Overijssel) or "ES" (Spain-Navarre)
#   learning    : "No learning" | "Slow dynamics" | "Fast dynamics" | "Informative"
#   runs        : number of Monte Carlo seed runs
#   memory      : true = apply pre-2016 renovation recall (default: true)
#   run_label   : prefix used for the output folder name
#   description : free-text note (not used by the model)

# -----------------------------------------------------------------------
# Netherlands — Overijssel
# -----------------------------------------------------------------------

- case_study: NL
  learning: No learning
  runs: 50
  memory: true
  n_households: 10000
  run_label: NL_NoLearning
  description: Netherlands baseline — no social learning dynamics

- case_study: NL
  learning: Slow dynamics
  runs: 50
  memory: true
  n_households: 10000
  run_label: NL_SlowDynamics
  description: Netherlands — slow neighbourhood social dynamics (>4 neighbours required)

- case_study: NL
  learning: Fast dynamics
  runs: 50
  memory: true
  n_households: 10000
  run_label: NL_FastDynamics
  description: Netherlands — fast neighbourhood social dynamics (no threshold)

- case_study: NL
  learning: Informative
  runs: 50
  memory: true
  n_households: 10000
  run_label: NL_Informative
  description: Netherlands — informative diffusion (all households gain knowledge each year)

# -----------------------------------------------------------------------
# Spain — Navarre
# -----------------------------------------------------------------------

- case_study: ES
  learning: No learning
  runs: 50
  memory: true
  n_households: 10000
  run_label: ES_NoLearning
  description: Spain baseline — no social learning dynamics

- case_study: ES
  learning: Slow dynamics
  runs: 50
  memory: true
  n_households: 10000
  run_label: ES_SlowDynamics
  description: Spain — slow neighbourhood social dynamics

- case_study: ES
  learning: Fast dynamics
  runs: 50
  memory: true
  n_households: 10000
  run_label: ES_FastDynamics
  description: Spain — fast neighbourhood social dynamics

- case_study: ES
  learning: Informative
  runs: 50
  memory: true
  n_households: 10000
  run_label: ES_Informative
  description: Spain — informative diffusion
